<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Interface</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 600px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #chat-header { background: #2c3e50; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 8px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
        .user-message { background: #3498db; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot-message { background: #ecf0f1; color: #2c3e50; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; }
        #user-input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; outline: none; transition: border 0.3s; }
        #user-input:focus { border-color: #3498db; }
        button { padding: 12px 20px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #2980b9; }
        .typing-indicator { color: #95a5a6; font-size: 0.9rem; align-self: flex-start; display: none; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Gen AI Assistant</div>
    <div id="chat-box">
        <div class="message bot-message">Hello! How can I help you today?</div>
    </div>
    <div id="typing" class="typing-indicator message">Assistant is typing...</div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById("chat-box");
    const userInput = document.getElementById("user-input");
    const typingIndicator = document.getElementById("typing");

    // Replace with your FastAPI backend URL if different
    const API_URL = "http://localhost:8000/api/chat"; 

    function appendMessage(text, sender) {
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", sender === "user" ? "user-message" : "bot-message");
        msgDiv.textContent = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        // Display user message
        appendMessage(message, "user");
        userInput.value = "";
        
        // Show typing indicator
        typingIndicator.style.display = "block";
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message, session_id: "12345" })
            });

            if (!response.ok) throw new Error("Network response was not ok");
            
            const data = await response.json();
            
            // Hide typing indicator and display bot response
            typingIndicator.style.display = "none";
            appendMessage(data.reply, "bot");

        } catch (error) {
            console.error("Error:", error);
            typingIndicator.style.display = "none";
            appendMessage("Sorry, I'm having trouble connecting to the server.", "bot");
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
